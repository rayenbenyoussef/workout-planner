<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weekly Workout Planner</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f14;
      --surface: #141720;
      --border: #252a38;
      --accent: #f0c040;
      --accent2: #4af4b0;
      --danger: #ff5f7e;
      --blue: #60a5fa;
      --text: #e8eaf2;
      --muted: #6b7280;
      --radius: 10px;
      --mono: 'DM Mono', monospace;
      --sans: 'DM Sans', sans-serif;
      --display: 'Syne', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
    }

    .wrapper { max-width: 980px; margin: 0 auto; }

    header {
      margin-bottom: 2.5rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 1.5rem;
    }
    .badge {
      display: inline-block;
      font-family: var(--mono);
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 2px 10px;
      border-radius: 999px;
      margin-bottom: 0.75rem;
    }
    h1 {
      font-family: var(--display);
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -0.02em;
    }
    h1 span { color: var(--accent); }
    .subtitle { color: var(--muted); margin-top: 0.5rem; font-size: 0.95rem; }

    .week-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.25rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      transition: border-color 0.2s;
      animation: fadeInUp 0.35s ease both;
    }
    .card:nth-child(1) { animation-delay: 0.05s; }
    .card:nth-child(2) { animation-delay: 0.10s; }
    .card:nth-child(3) { animation-delay: 0.15s; }
    .card:nth-child(4) { animation-delay: 0.20s; }
    .card:nth-child(5) { animation-delay: 0.25s; }
    .card:nth-child(6) { animation-delay: 0.30s; }
    .card:nth-child(7) { animation-delay: 0.35s; }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.1rem;
    }
    .day-label { font-family: var(--display); font-size: 1.05rem; font-weight: 700; }
    .day-badge {
      font-family: var(--mono);
      font-size: 0.65rem;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 5px;
      letter-spacing: 0.08em;
    }
    .badge-mon { background: #1a2d4a; color: var(--blue); }
    .badge-tue { background: #1a3a2a; color: var(--accent2); }
    .badge-wed { background: #3a2d10; color: #fbbf24; }
    .badge-thu { background: #2a1a3a; color: #c084fc; }
    .badge-fri { background: #3a1520; color: var(--danger); }
    .badge-sat { background: #1a3a30; color: #34d399; }
    .badge-sun { background: #3a2a10; color: var(--accent); }

    .exercise-list {
      list-style: none;
      margin-bottom: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      min-height: 10px;
    }
    .exercise-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.45rem 0.7rem;
      gap: 0.5rem;
      animation: fadeInUp 0.2s ease both;
    }
    .exercise-info { flex: 1; display: flex; flex-direction: column; gap: 1px; }
    .exercise-name { font-family: var(--mono); font-size: 0.82rem; color: var(--text); }
    .reps-pill {
      display: inline-block;
      background: #1a2d4a;
      color: var(--blue);
      font-family: var(--mono);
      font-size: 0.68rem;
      padding: 1px 7px;
      border-radius: 999px;
      white-space: nowrap;
      margin-top: 2px;
    }
    .item-actions { display: flex; gap: 0.3rem; }
    .icon-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.7rem;
      font-family: var(--mono);
      padding: 2px 7px;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .icon-btn:hover { border-color: var(--accent); color: var(--accent); }
    .icon-btn.del:hover { border-color: var(--danger); color: var(--danger); }

    .empty-state {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--muted);
      text-align: center;
      padding: 0.75rem 0;
      opacity: 0.7;
    }

    .btn-add-exercise {
      width: 100%;
      background: none;
      border: 1px dashed var(--border);
      border-radius: 6px;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 0.75rem;
      padding: 0.45rem;
      cursor: pointer;
      letter-spacing: 0.06em;
      transition: all 0.15s;
    }
    .btn-add-exercise:hover {
      border-color: var(--accent2);
      color: var(--accent2);
      background: rgba(74,244,176,0.04);
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.75rem;
      width: min(380px, 92vw);
      transform: translateY(16px);
      transition: transform 0.2s;
    }
    .modal-overlay.open .modal { transform: translateY(0); }
    .modal h3 { font-family: var(--display); font-size: 1.1rem; margin-bottom: 1.2rem; }
    .modal h3 span { color: var(--accent); }
    .modal-fields { display: flex; flex-direction: column; gap: 0.85rem; margin-bottom: 1.25rem; }
    .modal-field { display: flex; flex-direction: column; gap: 0.35rem; }
    .modal-field label {
      font-family: var(--mono);
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .modal-field input {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.9rem;
      padding: 0.55rem 0.75rem;
      width: 100%;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .modal-field input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(240,192,64,0.12);
    }
    .modal-field input::placeholder { color: var(--muted); opacity: 0.6; }
    .modal-actions { display: flex; gap: 0.65rem; justify-content: flex-end; }
    .btn {
      font-family: var(--mono);
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      padding: 0.5rem 1.1rem;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:active { transform: scale(0.97); }
    .btn:hover { opacity: 0.88; }
    .btn-confirm { background: var(--accent2); color: #0a1f17; }
    .btn-cancel { background: var(--border); color: var(--muted); }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      padding: 0.75rem 1.25rem;
      border-radius: 8px;
      font-family: var(--mono);
      font-size: 0.82rem;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.25s, transform 0.25s;
      pointer-events: none;
      z-index: 999;
    }
    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.ok { background: #1a3a2a; color: var(--accent2); border: 1px solid var(--accent2); }
    #toast.err { background: #3a1520; color: var(--danger); border: 1px solid var(--danger); }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<div class="wrapper">
  <header>
    <div class="badge">Node.js · Express · SQLite</div>
    <h1>Workout <span>Planner</span></h1>
    <p class="subtitle">Plan your week — exercises are saved to the database automatically</p>
  </header>
  <div class="week-grid" id="weekGrid"></div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3 id="modalTitle">Add <span>Exercise</span></h3>
    <div class="modal-fields">
      <div class="modal-field">
        <label>Exercise Name</label>
        <input type="text" id="inputName" placeholder="e.g. Push-ups" />
      </div>
      <div class="modal-field">
        <label>Reps / Sets</label>
        <input type="text" id="inputReps" placeholder="e.g. 3×12 or 30 sec" />
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn btn-confirm" onclick="confirmModal()">Save</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
  const DAYS = [
    { key: 'mon', label: 'Monday',    badge: 'MON', cls: 'badge-mon' },
    { key: 'tue', label: 'Tuesday',   badge: 'TUE', cls: 'badge-tue' },
    { key: 'wed', label: 'Wednesday', badge: 'WED', cls: 'badge-wed' },
    { key: 'thu', label: 'Thursday',  badge: 'THU', cls: 'badge-thu' },
    { key: 'fri', label: 'Friday',    badge: 'FRI', cls: 'badge-fri' },
    { key: 'sat', label: 'Saturday',  badge: 'SAT', cls: 'badge-sat' },
    { key: 'sun', label: 'Sunday',    badge: 'SUN', cls: 'badge-sun' },
  ];

  // Local cache loaded from DB on startup
  const state = {};
  DAYS.forEach(d => state[d.key] = []);

  let modalMode = null; // 'add' | 'edit'
  let modalDay  = null;
  let modalId   = null;

  /* ── Render ─────────────────────────────────────── */
  function render() {
    const grid = document.getElementById('weekGrid');
    grid.innerHTML = '';
    DAYS.forEach(d => {
      const exercises = state[d.key];
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="card-header">
          <span class="day-label">${d.label}</span>
          <span class="day-badge ${d.cls}">${d.badge}</span>
        </div>
        <ul class="exercise-list" id="list-${d.key}">
          ${exercises.length === 0
            ? `<li class="empty-state">No exercises yet</li>`
            : exercises.map(ex => `
              <li class="exercise-item">
                <div class="exercise-info">
                  <span class="exercise-name">${escHtml(ex.name)}</span>
                  <span class="reps-pill">${escHtml(ex.reps)}</span>
                </div>
                <div class="item-actions">
                  <button class="icon-btn" onclick="openEdit('${d.key}','${ex.id}')">edit</button>
                  <button class="icon-btn del" onclick="removeExercise('${d.key}','${ex.id}')">del</button>
                </div>
              </li>`).join('')
          }
        </ul>
        <button class="btn-add-exercise" onclick="openAdd('${d.key}')">+ Add Exercise</button>
      `;
      grid.appendChild(card);
    });
  }

  /* ── Load all data from DB on page load ─────────── */
  async function loadAll() {
    try {
      const res = await fetch('/exercises');
      if (!res.ok) throw new Error('Failed to load');
      const rows = await res.json();
      DAYS.forEach(d => state[d.key] = []);
      rows.forEach(row => {
        if (state[row.day]) state[row.day].push(row);
      });
      render();
    } catch (err) {
      showToast('✗ Could not load exercises from server', 'err');
      render();
    }
  }

  /* ── Modal ──────────────────────────────────────── */
  function openAdd(day) {
    modalMode = 'add';
    modalDay  = day;
    modalId   = null;
    document.getElementById('modalTitle').innerHTML = `Add <span>Exercise</span>`;
    document.getElementById('inputName').value = '';
    document.getElementById('inputReps').value = '';
    document.getElementById('modalOverlay').classList.add('open');
    setTimeout(() => document.getElementById('inputName').focus(), 100);
  }

  function openEdit(day, id) {
    const ex = state[day].find(e => e.id === id);
    if (!ex) return;
    modalMode = 'edit';
    modalDay  = day;
    modalId   = id;
    document.getElementById('modalTitle').innerHTML = `Edit <span>Exercise</span>`;
    document.getElementById('inputName').value = ex.name;
    document.getElementById('inputReps').value = ex.reps;
    document.getElementById('modalOverlay').classList.add('open');
    setTimeout(() => document.getElementById('inputName').focus(), 100);
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
  }

  async function confirmModal() {
    const name = document.getElementById('inputName').value.trim();
    const reps = document.getElementById('inputReps').value.trim();
    if (!name) { showToast('Exercise name is required', 'err'); return; }
    if (!reps) { showToast('Reps/Sets is required', 'err'); return; }

    if (modalMode === 'add') {
      /* ── POST /exercises ── */
      const id = uid();
      try {
        const res = await fetch('/exercises', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id, day: modalDay, name, reps }),
        });
        if (!res.ok) throw new Error(await res.text());
        state[modalDay].push({ id, day: modalDay, name, reps });
        showToast('✓ Exercise added', 'ok');
      } catch (err) {
        showToast(`✗ ${err.message}`, 'err');
      }

    } else {
      /* ── PUT /exercises/:id ── */
      try {
        const res = await fetch(`/exercises/${modalId}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, reps }),
        });
        if (!res.ok) throw new Error(await res.text());
        const ex = state[modalDay].find(e => e.id === modalId);
        if (ex) { ex.name = name; ex.reps = reps; }
        showToast('✓ Exercise updated', 'ok');
      } catch (err) {
        showToast(`✗ ${err.message}`, 'err');
      }
    }

    closeModal();
    render();
  }

  /* ── DELETE /exercises/:id ───────────────────────── */
  async function removeExercise(day, id) {
    try {
      const res = await fetch(`/exercises/${id}`, { method: 'DELETE' });
      if (!res.ok) throw new Error(await res.text());
      state[day] = state[day].filter(e => e.id !== id);
      showToast('✓ Exercise removed', 'ok');
      render();
    } catch (err) {
      showToast(`✗ ${err.message}`, 'err');
    }
  }

  /* ── Helpers ─────────────────────────────────────── */
  function uid() { return Math.random().toString(36).slice(2, 9); }

  function escHtml(str) {
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  let toastTimer;
  function showToast(msg, type = 'ok') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `show ${type}`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.className = '', 3000);
  }

  document.getElementById('modalOverlay').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeModal();
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
    if (e.key === 'Enter' && document.getElementById('modalOverlay').classList.contains('open')) confirmModal();
  });

  // Boot: load from DB
  loadAll();
</script>
</body>
</html>
